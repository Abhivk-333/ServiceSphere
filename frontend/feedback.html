<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave a Review — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .review-wrap{max-width:560px;margin:0 auto}
    .review-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:2rem;text-align:center}
    .review-card h1{font-size:1.4rem;font-weight:700;margin-bottom:.5rem}
    .prov-mini{display:flex;align-items:center;gap:1rem;justify-content:center;margin:1.5rem 0}
    .prov-mini img{width:56px;height:56px;border-radius:50%;object-fit:cover}
    .prov-mini .name{font-weight:700}
    .prov-mini .cat{font-size:.78rem;color:var(--text-muted)}
    .stars-input{display:flex;gap:.4rem;justify-content:center;margin:1.5rem 0}
    .stars-input .star{width:40px;height:40px;cursor:pointer;color:var(--border-color);transition:.2s}
    .stars-input .star.active,.stars-input .star:hover{color:#eab308;transform:scale(1.15)}
    .review-card textarea{width:100%;min-height:120px;margin-top:1rem}
    .success-msg{display:none;text-align:center;padding:3rem}
    .success-msg.show{display:block}
    .success-msg .check{width:64px;height:64px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:#16a34a}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <nav class="sidebar-menu">
      <a href="dashboard-customer.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="services.html" class="sidebar-item"><i data-feather="search" style="width:18px"></i> Find Services</a>
      <a href="history.html" class="sidebar-item"><i data-feather="clock" style="width:18px"></i> My Bookings</a>
      <a href="chat-customer.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <div class="review-wrap">
      <div class="review-card" id="reviewForm">
        <h1>How was your experience?</h1>
        <p class="text-muted" style="font-size:.88rem">Your feedback helps improve the community</p>
        <div class="prov-mini" id="provInfo"></div>
        <p style="font-size:.85rem;font-weight:600">Rate this service</p>
        <div class="stars-input" id="starsRow"></div>
        <textarea class="form-input" id="commentInput" placeholder="Tell us about your experience..."></textarea>
        <button class="btn btn-primary" style="width:100%;margin-top:1.25rem" onclick="submitReview()">Submit Review</button>
      </div>
      <div class="success-msg" id="successMsg">
        <div class="check"><i data-feather="check" style="width:32px;height:32px"></i></div>
        <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem">Thank you!</h2>
        <p class="text-muted" style="margin-bottom:1.5rem">Your review has been submitted successfully.</p>
        <a href="dashboard-customer.html" class="btn btn-primary">Back to Dashboard</a>
      </div>
    </div>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>AuthGuard.require('customer');</script>
<script>
  AuthGuard.require('customer');
  const bid = new URLSearchParams(location.search).get('bid');
  let selectedRating = 0;
  let prov = null;

  async function loadReview() {
    try {
      const allBookings = await SS.getBookings();
      const booking = allBookings.find(b => b._id === bid);
      if (!booking) throw new Error("Booking not found");
      prov = booking.providerId;

      document.getElementById('provInfo').innerHTML=`<img src="${prov?.profilePic || 'https://via.placeholder.com/48'}" alt=""><div style="text-align:left"><div class="name">${prov?.firstName} ${prov?.lastName}</div><div class="cat">${prov?.category || ''} · ${prov?.city || ''}</div></div>`;
    } catch (err) {
      console.error(err);
      document.getElementById('reviewForm').innerHTML = `<p style="color:#ef4444">${err.message}</p>`;
    }
  }

  // Stars
  const starsRow = document.getElementById('starsRow');
  for(let i=1; i<=5; i++) {
    const s = document.createElement('div');
    s.className = 'star'; s.innerHTML = '★'; s.style.fontSize = '2rem';
    s.onclick = () => { selectedRating = i; updateStars(); };
    starsRow.appendChild(s);
  }
  function updateStars() { starsRow.querySelectorAll('.star').forEach((s, i) => { s.classList.toggle('active', i < selectedRating); }); }

  async function submitReview() {
    if (!selectedRating) { alert('Please select a rating'); return; }
    // As there is no backend route for reviews yet, we'll simulate the success
    document.getElementById('reviewForm').style.display='none';
    document.getElementById('successMsg').classList.add('show');
    feather.replace();
  }

  loadReview();
</script>
</body>
</html>
