<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .profile-sections{max-width:720px}
    .p-section{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:2rem;margin-bottom:1.5rem}
    .p-section h2{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem}
    .p-section h2 .icon{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;background:rgba(79,70,229,.08);color:var(--primary)}
    .photo-row{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem}
    .photo-row img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--border-color)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .save-bar{display:flex;justify-content:flex-end;gap:1rem;margin-top:1rem}
    .badge-status{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .85rem;border-radius:999px;font-size:.78rem;font-weight:600}
    .badge-verified{background:#dcfce7;color:#16a34a}
    .badge-pending{background:#fef9c3;color:#92400e}
    @media(max-width:600px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Provider</p>
    <nav class="sidebar-menu">
      <a href="dashboard-provider.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="manage-services.html" class="sidebar-item"><i data-feather="briefcase" style="width:18px"></i> My Services</a>
      <a href="active-job.html" class="sidebar-item"><i data-feather="zap" style="width:18px"></i> Active Jobs</a>
      <a href="chat-provider.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
      <a href="earnings.html" class="sidebar-item"><i data-feather="dollar-sign" style="width:18px"></i> Earnings</a>
      <a href="profile-provider.html" class="sidebar-item active"><i data-feather="user" style="width:18px"></i> My Profile</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444" onclick="SS.logout()"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.3rem">My Profile</h1>
    <p class="text-muted" style="font-size:.85rem;margin-bottom:2rem">Update your information — this feeds your public profile and service listings</p>

    <div id="toast" class="toast"></div>

    <div class="profile-sections" id="profileContent">
      <div style="text-align:center;padding:3rem;color:var(--text-muted)">
        <i data-feather="loader" style="width:32px;height:32px;animation:spin 1s linear infinite"></i>
        <p style="margin-top:.75rem">Loading profile…</p>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  AuthGuard.require('provider');
  feather.replace();

  function showToast(msg, ok = true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = ok ? 'linear-gradient(135deg,#10b981,#059669)' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function loadProfile() {
    try {
      const user = await SS.fetchProfile();
      renderForm(user);
    } catch (err) {
      showToast('Failed to load profile', false);
    }
  }

  function renderForm(u) {
    const statusBadge = u.verified
      ? `<span class="badge-status badge-verified">✓ Verified by Admin</span>`
      : `<span class="badge-status badge-pending">⏳ Pending Admin Verification</span>`;

    document.getElementById('profileContent').innerHTML = `
      <div class="p-section">
        <h2><span class="icon"><i data-feather="user" style="width:16px"></i></span> Profile Information ${statusBadge}</h2>
        <div class="photo-row">
          <img src="${u.profilePic || 'https://via.placeholder.com/80'}" alt="" id="avatarImg">
          <div>
            <button class="btn btn-outline" style="padding:.4rem 1rem;font-size:.8rem">Change Photo</button>
            <p class="text-muted" style="font-size:.72rem;margin-top:.3rem">JPG, PNG up to 5MB</p>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" id="pFirstName" value="${u.firstName || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" id="pLastName" value="${u.lastName || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-input" id="pPhone" value="${u.phone || ''}" readonly style="background:#f8fafc;color:var(--text-muted)">
          </div>
          <div class="form-group">
            <label class="form-label">Location / City</label>
            <input type="text" class="form-input" id="pLocation" placeholder="e.g. Bengaluru" value="${u.location || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category / Specialization</label>
            <input type="text" class="form-input" id="pCategory" placeholder="e.g. Plumbing, Electrical" value="${u.category || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Experience</label>
            <input type="text" class="form-input" id="pExp" placeholder="e.g. 5 years" value="${u.experience || ''}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Bio / About</label>
          <textarea class="form-input" id="pBio" rows="3" placeholder="Tell customers about yourself…">${u.bio || ''}</textarea>
        </div>
      </div>
      <div class="save-bar">
        <a href="dashboard-provider.html" class="btn btn-outline">Cancel</a>
        <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">Save Changes</button>
      </div>`;
    feather.replace();
  }

  async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    try {
      const data = {
        firstName:  document.getElementById('pFirstName').value.trim(),
        lastName:   document.getElementById('pLastName').value.trim(),
        phone:      document.getElementById('pPhone').value.trim(),
        location:   document.getElementById('pLocation').value.trim(),
        category:   document.getElementById('pCategory').value.trim(),
        experience: document.getElementById('pExp').value.trim(),
        bio:        document.getElementById('pBio').value.trim(),
      };

      const updated = await SS.updateProfile(data);
      SS.setUser(updated);
      showToast('Profile saved! ✓');
      renderForm(updated);
    } catch (err) {
      showToast('Save failed: ' + err.message, false);
    } finally {
      btn.textContent = 'Save Changes';
      btn.disabled = false;
    }
  }

  loadProfile();
</script>
</body>
</html>
