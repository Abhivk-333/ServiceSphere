<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Dashboard — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .req-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;transition:var(--transition)}
    .req-card:hover{box-shadow:var(--shadow-md)}
    .req-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
    .req-top img{width:44px;height:44px;border-radius:50%;object-fit:cover}
    .req-top .name{font-weight:700;font-size:.9rem}
    .req-top .meta{font-size:.78rem;color:var(--text-muted)}
    .req-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:1rem;font-size:.82rem}
    .req-details .label{color:var(--text-muted);font-size:.72rem}
    .req-actions{display:flex;gap:.5rem}
    .quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
    .qs{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
    .qs .val{font-size:1.8rem;font-weight:800;margin:.3rem 0}
    .qs .lbl{font-size:.78rem;color:var(--text-muted)}
    /* Dynamic action button states */
    .action-btn-accepted    {background:linear-gradient(135deg,#4f46e5,#7c3aed)}
    .action-btn-started_travel{background:linear-gradient(135deg,#f97316,#ea580c)}
    .action-btn-arrived     {background:linear-gradient(135deg,#0ea5e9,#0284c7)}
    .action-btn-started_work{background:linear-gradient(135deg,#10b981,#059669)}
    .action-btn-completed   {background:#6b7280;cursor:default}
    /* Milestone mini-list */
    .m-list{display:flex;flex-direction:column;gap:.3rem;margin:.75rem 0}
    .m-item{display:flex;align-items:center;gap:.6rem;font-size:.8rem}
    .m-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .m-dot.done{background:#10b981}
    .m-dot.next{background:#f97316;animation:pulse 1.2s infinite}
    .m-dot.pending{background:#e2e8f0}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @media(max-width:768px){.quick-stats{grid-template-columns:1fr 1fr}.req-details{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Provider</p>
    <nav class="sidebar-menu">
      <a href="dashboard-provider.html" class="sidebar-item active"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="manage-services.html" class="sidebar-item"><i data-feather="briefcase" style="width:18px"></i> My Services</a>
      <a href="active-job.html" class="sidebar-item"><i data-feather="zap" style="width:18px"></i> Active Jobs</a>
      <a href="chat-provider.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
      <a href="earnings.html" class="sidebar-item"><i data-feather="dollar-sign" style="width:18px"></i> Earnings</a>
      <a href="profile-provider.html" class="sidebar-item"><i data-feather="user" style="width:18px"></i> My Profile</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444" onclick="SS.logout()"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <div class="dashboard-header">
      <div><h1 style="font-size:1.6rem;font-weight:700" id="greetingTitle">Provider Dashboard</h1><p class="text-muted" style="font-size:.85rem">Manage your bookings and services</p></div>
      <div style="display:flex;align-items:center;gap:1rem">
        <button style="background:none;position:relative"><i data-feather="bell" style="width:20px;color:var(--text-muted)"></i><span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#ef4444;border-radius:50%" id="notifDot"></span></button>
        <img id="provAvatar" src="https://randomuser.me/api/portraits/men/32.jpg" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--border-color)" alt="">
      </div>
    </div>

    <!-- Unverified warning banner -->
    <div id="unverifBanner" style="display:none;background:#fef9c3;border:1px solid #fde68a;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.85rem;color:#92400e;display:flex;align-items:center;gap:.6rem">
      <i data-feather="clock" style="width:16px;flex-shrink:0"></i>
      <span>Your account is <strong>pending admin verification</strong>. You will appear in customer listings once approved.</span>
    </div>

    <!-- Quick stats -->
    <div class="quick-stats" id="quickStats"></div>

    <!-- Live Jobs -->
    <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
      <i data-feather="zap" style="width:20px;color:var(--primary)"></i> Live Jobs
    </h2>
    <div id="liveJobsList" style="margin-bottom:3rem"></div>

    <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:1rem">New Requests</h2>
    <div id="requestsList"></div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  AuthGuard.require('provider');
  const user = SS.getUser();
  const prov = SS.getProvider(user.id) || SS.getProviders()[0];

  // Greeting + avatar
  document.getElementById('greetingTitle').textContent = `Welcome, ${prov ? prov.name.split(' ')[0] : user.name}`;
  if (prov) document.getElementById('provAvatar').src = prov.photo;

  // Unverified banner
  if (prov && !prov.is_verified) {
    document.getElementById('unverifBanner').style.display = 'flex';
  }

  // Milestone labels for the mini list
  const ML = {
    accepted:      '✅ Booking Accepted',
    started_travel:'🛵 On The Way',
    arrived:       '📍 Arrived',
    started_work:  '🛠️ Work Started',
    completed:     '🎉 Completed'
  };

  // Next action button config
  const ACTION_CFG = {
    null:          { label:'🛵 Start Travelling',   cls:'action-btn-accepted'     },
    accepted:      { label:'🛵 Start Travelling',   cls:'action-btn-accepted'     },
    started_travel:{ label:'📍 Mark Arrived',       cls:'action-btn-started_travel'},
    arrived:       { label:'🛠️ Start Work',         cls:'action-btn-arrived'      },
    started_work:  { label:'✅ Complete Job',        cls:'action-btn-started_work' },
    completed:     { label:'✔ Job Done',            cls:'action-btn-completed'    }
  };

  function updateDashboard() {
    if (!prov) return;
    const allBookings = SS.getBookings().filter(b => b.providerId === prov.id);
    const pending   = allBookings.filter(b => !b.milestones?.accepted);
    const live      = allBookings.filter(b => b.milestones?.accepted && !b.milestones?.completed);
    const completed = allBookings.filter(b => b.milestones?.completed);
    const totalEarnings = completed.reduce((s,b) => s + (b.amount || 0), 0);

    // Notification dot
    document.getElementById('notifDot').style.display = pending.length ? '' : 'none';

    // Stats
    document.getElementById('quickStats').innerHTML = `
      <div class="qs"><div class="lbl">New</div><div class="val" style="color:#eab308">${pending.length}</div></div>
      <div class="qs"><div class="lbl">In Progress</div><div class="val" style="color:var(--primary)">${live.length}</div></div>
      <div class="qs"><div class="lbl">Completed</div><div class="val" style="color:#16a34a">${completed.length}</div></div>
      <div class="qs"><div class="lbl">Earnings</div><div class="val">₹${totalEarnings.toLocaleString()}</div></div>`;

    // ── Live Jobs ──
    const liveEl = document.getElementById('liveJobsList');
    if (!live.length) {
      liveEl.innerHTML = '<p class="text-muted" style="font-size:.85rem;padding:2rem;text-align:center;background:#fff;border-radius:var(--radius-lg);border:1px dashed var(--border-color)">No jobs currently in progress.</p>';
    } else {
      liveEl.innerHTML = live.map(b => {
        const curMilestone = SS.getCurrentMilestone(b);
        const nextMilestone = SS.getNextMilestone(b);
        const cfg = ACTION_CFG[curMilestone] || ACTION_CFG['null'];

        // Mini milestone list
        const miniList = SS.MILESTONES.map(k => {
          const done = SS.isMilestoneDone(b, k);
          const isNext = k === nextMilestone && !done;
          return `<div class="m-item">
            <div class="m-dot ${done ? 'done' : isNext ? 'next' : 'pending'}"></div>
            <span style="color:${done ? 'var(--text-main)' : isNext ? '#f97316' : 'var(--text-muted)'};font-weight:${done||isNext?'600':'400'}">${ML[k]}</span>
          </div>`;
        }).join('');

        // ETA select only for started_travel step
        const etaRow = nextMilestone === 'started_travel' ? `
          <div style="display:flex;align-items:center;gap:.5rem;margin-top:.75rem;flex-wrap:wrap">
            <label style="font-size:.8rem;font-weight:600">ETA:</label>
            <select id="eta-${b.id}" style="padding:.35rem .6rem;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:.82rem">
              <option value="15">15 min</option><option value="30">30 min</option><option value="45">45 min</option>
            </select>
          </div>` : '';

        return `<div style="margin-bottom:1.5rem;background:#fff;padding:1.5rem;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--border-color)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <div style="font-weight:700">Booking #${b.id} · ₹${b.amount}</div>
            <div class="badge badge-blue">${(curMilestone||'accepted').replace('_',' ').toUpperCase()}</div>
          </div>
          <div class="m-list">${miniList}</div>
          ${etaRow}
          <div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">
            ${nextMilestone
              ? `<button class="btn ${cfg.cls}" style="flex:1;color:#fff;padding:.6rem" onclick="advanceJob('${b.id}')">${cfg.label}</button>`
              : `<span class="badge badge-green" style="flex:1;text-align:center;padding:.65rem">🎉 Job Completed</span>`}
            <a href="chat-provider.html?bid=${b.id}" class="btn btn-outline" style="padding:.6rem .85rem"><i data-feather="message-circle" style="width:16px"></i></a>
          </div>
        </div>`;
      }).join('');
    }

    // ── New Requests ──
    const reqEl = document.getElementById('requestsList');
    if (!pending.length) {
      reqEl.innerHTML = '<p class="text-muted" style="font-size:.85rem;padding:2rem;text-align:center">No new requests. 🎉</p>';
    } else {
      reqEl.innerHTML = pending.map(b => `
        <div class="req-card">
          <div class="req-top"><img src="https://randomuser.me/api/portraits/women/12.jpg" alt=""><div><div class="name">Customer</div><div class="meta">Booking #${b.id}</div></div><div style="margin-left:auto"><span class="badge badge-yellow">Pending</span></div></div>
          <div class="req-details">
            <div><div class="label">Date &amp; Time</div><div style="font-weight:600">${b.date} · ${b.time}</div></div>
            <div><div class="label">Address</div><div>${b.address || '—'}</div></div>
            <div><div class="label">Amount</div><div style="font-weight:700;color:var(--primary)">₹${b.amount}</div></div>
          </div>
          <div class="req-actions">
            <button class="btn btn-primary" style="flex:1;padding:.5rem" onclick="acceptBooking('${b.id}')">Accept Booking</button>
            <button class="btn btn-outline" style="padding:.5rem .85rem;color:#ef4444;border-color:#fca5a5" onclick="declineBooking('${b.id}')">Decline</button>
          </div>
        </div>`).join('');
    }
    feather.replace();
  }

  window.addEventListener('ss_data_updated', updateDashboard);
  updateDashboard();

  function advanceJob(id) {
    const b = SS.getBooking(id);
    if (!b) return;
    // Capture ETA if moving to started_travel
    const next = SS.getNextMilestone(b);
    if (next === 'started_travel') {
      const sel = document.getElementById('eta-' + id);
      if (sel) SS.updateBooking(id, { eta: parseInt(sel.value) });
    }
    SS.advanceMilestone(id);
    updateDashboard();
  }

  function acceptBooking(id) {
    SS.advanceMilestone(id); // stamps 'accepted'
    updateDashboard();
  }

  function declineBooking(id) {
    if (confirm('Decline this booking?')) {
      SS.updateBooking(id, { status: 'declined' });
      updateDashboard();
    }
  }
</script>
</body>
</html>
