<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Verify Providers — Service Sphere</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .admin-sidebar{width:240px;background:#1e1b4b;color:#fff;display:flex;flex-direction:column;padding:1.5rem;min-height:100vh}
    .admin-sidebar .brand{font-size:1.2rem;font-weight:800;color:#fff;margin-bottom:.2rem}
    .admin-sidebar .role-tag{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:2rem}
    .admin-nav a{display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-radius:var(--radius-md);color:rgba(255,255,255,.65);font-size:.88rem;font-weight:500;margin-bottom:.35rem;transition:var(--transition);text-decoration:none}
    .admin-nav a:hover,.admin-nav a.active{background:rgba(255,255,255,.1);color:#fff}
    .admin-nav a.active{background:rgba(255,255,255,.15)}
    .pv-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;transition:var(--transition)}
    .pv-card:hover{box-shadow:var(--shadow-md)}
    .pv-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
    .pv-top img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border-color)}
    .pv-top .name{font-weight:700;font-size:.95rem}
    .pv-top .meta{font-size:.78rem;color:var(--text-muted)}
    .pv-fields{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.25rem;font-size:.84rem}
    .pv-field .lbl{font-size:.72rem;color:var(--text-muted);margin-bottom:.2rem}
    .pv-field .val{font-weight:600}
    .id-photo{width:100%;max-height:140px;object-fit:cover;border-radius:var(--radius-md);border:1px solid var(--border-color);margin-bottom:1.25rem;background:#f1f5f9}
    .pv-actions{display:flex;gap:.75rem}
    .sos-card{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
    .sos-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem;font-weight:700;color:#991b1b}
    .sos-meta{font-size:.8rem;color:#7f1d1d;margin-bottom:.75rem}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted)}
    .empty-state i{opacity:.3;margin-bottom:1rem}
    .tab-bar{display:flex;gap:.5rem;margin-bottom:1.75rem}
    .tab{padding:.55rem 1.25rem;border-radius:999px;border:1px solid var(--border-color);font-size:.84rem;font-weight:600;cursor:pointer;background:#fff;transition:var(--transition)}
    .tab.active{background:#1e1b4b;color:#fff;border-color:#1e1b4b}
    #toast{position:fixed;top:1.5rem;right:1.5rem;z-index:9999;background:#1e1b4b;color:#fff;padding:.75rem 1.25rem;border-radius:var(--radius-md);font-size:.85rem;font-weight:500;transform:translateX(120%);transition:transform .3s ease;box-shadow:var(--shadow-lg)}
    #toast.show{transform:translateX(0)}
    @media(max-width:768px){.admin-sidebar{display:none}}
  </style>
</head>
<body>
<div id="toast"></div>
<div class="dashboard-layout">
  <!-- Admin Sidebar -->
  <aside class="admin-sidebar">
    <div class="brand">Service Sphere</div>
    <div class="role-tag">Admin Panel</div>
    <nav class="admin-nav">
      <a href="verify-providers.html" class="active"><i data-feather="shield" style="width:16px"></i> Verify Providers</a>
      <a href="verify-providers.html#sos"><i data-feather="alert-triangle" style="width:16px"></i> SOS Alerts <span id="sosBadge" style="margin-left:auto;background:#ef4444;color:#fff;font-size:.65rem;padding:.1rem .45rem;border-radius:999px;display:none"></span></a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1)">
      <a href="login.html" style="display:flex;align-items:center;gap:.6rem;color:rgba(255,255,255,.5);font-size:.84rem;text-decoration:none" onclick="SS.logout()">
        <i data-feather="log-out" style="width:16px"></i> Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="dashboard-header">
      <div>
        <h1 style="font-size:1.6rem;font-weight:700">Admin Control Panel</h1>
        <p class="text-muted" style="font-size:.85rem">Manage provider verification and platform safety</p>
      </div>
      <div id="adminUser" style="font-size:.85rem;color:var(--text-muted)"></div>
    </div>

    <!-- Stats Row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem" id="statsRow"></div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab active" id="tab-pending" onclick="switchTab('pending')">⏳ Pending Verification</div>
      <div class="tab" id="tab-approved" onclick="switchTab('approved')">✅ Approved Providers</div>
      <div class="tab" id="tab-sos" onclick="switchTab('sos')">🚨 SOS Alerts</div>
    </div>

    <!-- Panels -->
    <div id="panel-pending"></div>
    <div id="panel-approved" style="display:none"></div>
    <div id="panel-sos" style="display:none"></div>
  </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script>
  AuthGuard.require('admin');
  feather.replace();

  const user = SS.getUser();
  document.getElementById('adminUser').textContent = `Logged in as ${user.name}`;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function switchTab(tab) {
    ['pending','approved','sos'].forEach(t => {
      document.getElementById('tab-'+t).classList.toggle('active', t===tab);
      document.getElementById('panel-'+t).style.display = t===tab ? '' : 'none';
    });
  }

  // Handle URL hash for deep-link to SOS
  if (location.hash === '#sos') switchTab('sos');

  function render() {
    const all = SS.getAllProviders();
    const pending  = all.filter(p => !p.is_verified);
    const approved = all.filter(p => p.is_verified);
    const sos      = SS.getSOSAlerts();
    const unresolved = sos.filter(a => !a.resolved);

    // Stats
    document.getElementById('statsRow').innerHTML = `
      <div style="background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;text-align:center">
        <div style="font-size:1.8rem;font-weight:800;color:#eab308">${pending.length}</div>
        <div style="font-size:.78rem;color:var(--text-muted)">Awaiting Approval</div>
      </div>
      <div style="background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;text-align:center">
        <div style="font-size:1.8rem;font-weight:800;color:#16a34a">${approved.length}</div>
        <div style="font-size:.78rem;color:var(--text-muted)">Verified Providers</div>
      </div>
      <div style="background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;text-align:center">
        <div style="font-size:1.8rem;font-weight:800;color:#ef4444">${unresolved.length}</div>
        <div style="font-size:.78rem;color:var(--text-muted)">Active SOS Alerts</div>
      </div>`;

    // SOS badge on nav
    const badge = document.getElementById('sosBadge');
    if (unresolved.length) { badge.textContent = unresolved.length; badge.style.display=''; }
    else { badge.style.display='none'; }

    // ── Pending Panel ──
    document.getElementById('panel-pending').innerHTML = pending.length
      ? pending.map(p => `
        <div class="pv-card" id="card-${p.id}">
          <div class="pv-top">
            <img src="${p.photo}" alt="${p.name}">
            <div>
              <div class="name">${p.name}</div>
              <div class="meta">${p.category} · ${p.city} · ${p.experience}</div>
            </div>
            <span class="badge badge-yellow" style="margin-left:auto">Pending</span>
          </div>
          <div class="pv-fields">
            <div class="pv-field"><div class="lbl">Phone</div><div class="val">${p.phone}</div></div>
            <div class="pv-field"><div class="lbl">Experience</div><div class="val">${p.experience}</div></div>
            <div class="pv-field"><div class="lbl">Govt ID Number</div><div class="val">${p.govt_id_number || '—'}</div></div>
            <div class="pv-field"><div class="lbl">Services Listed</div><div class="val">${(p.services||[]).length}</div></div>
          </div>
          <div class="pv-field" style="margin-bottom:.85rem"><div class="lbl">ID Photo</div></div>
          <img src="${p.id_photo}" alt="ID Photo" class="id-photo">
          <div class="pv-actions">
            <button class="btn btn-primary" style="flex:1" onclick="approveProvider('${p.id}')">
              ✓ Approve &amp; Verify Provider
            </button>
            <button class="btn btn-outline" style="padding:.6rem .85rem;color:#ef4444;border-color:#fca5a5" onclick="rejectProvider('${p.id}')">
              Reject
            </button>
          </div>
        </div>`).join('')
      : `<div class="empty-state"><i data-feather="check-circle" style="width:48px;height:48px"></i><p>No providers pending verification. 🎉</p></div>`;

    // ── Approved Panel ──
    document.getElementById('panel-approved').innerHTML = approved.length
      ? approved.map(p => `
        <div class="pv-card">
          <div class="pv-top">
            <img src="${p.photo}" alt="${p.name}">
            <div>
              <div class="name">${p.name}</div>
              <div class="meta">${p.category} · ${p.city} · ★ ${p.rating} (${p.reviewCount} reviews)</div>
            </div>
            <span class="badge badge-green" style="margin-left:auto">✓ Verified</span>
          </div>
          <div class="pv-fields">
            <div class="pv-field"><div class="lbl">Phone</div><div class="val">${p.phone}</div></div>
            <div class="pv-field"><div class="lbl">Govt ID</div><div class="val">${p.govt_id_number || '—'}</div></div>
          </div>
        </div>`).join('')
      : `<div class="empty-state"><p>No verified providers yet.</p></div>`;

    // ── SOS Panel ──
    document.getElementById('panel-sos').innerHTML = sos.length
      ? sos.map(a => `
        <div class="sos-card" style="${a.resolved ? 'opacity:.55' : ''}">
          <div class="sos-header"><i data-feather="alert-octagon" style="width:18px;height:18px"></i> SOS Alert ${a.resolved ? '(Resolved)' : '— ACTIVE'}</div>
          <div class="sos-meta">
            <strong>${a.customerName}</strong> · Booking #${a.bookingId}<br>
            ${new Date(a.timestamp).toLocaleString()}<br>
            "${a.message}"
          </div>
          ${!a.resolved
            ? `<button class="btn btn-outline" style="padding:.45rem 1rem;font-size:.82rem;border-color:#fca5a5;color:#991b1b" onclick="resolveAlert('${a.id}')">Mark Resolved</button>`
            : `<span style="font-size:.8rem;color:#16a34a;font-weight:600">✓ Resolved</span>`}
        </div>`).join('')
      : `<div class="empty-state"><i data-feather="shield-off" style="width:48px;height:48px"></i><p>No SOS alerts. All clear!</p></div>`;

    feather.replace();
  }

  function approveProvider(id) {
    SS.approveProvider(id);
    showToast('Provider approved and verified ✓');
    render();
  }

  function rejectProvider(id) {
    if (!confirm('Reject this provider? This cannot be undone.')) return;
    const all = SS.getAllProviders().filter(p => p.id !== id);
    localStorage.setItem('ss_providers', JSON.stringify(all));
    showToast('Provider rejected and removed.');
    render();
  }

  function resolveAlert(id) {
    SS.resolveSOSAlert(id);
    showToast('SOS alert marked as resolved.');
    render();
  }

  render();
</script>
</body>
</html>
