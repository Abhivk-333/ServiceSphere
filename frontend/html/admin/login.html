<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Service Sphere</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-color)}
    .admin-box{width:100%;max-width:400px;background:var(--surface-color);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);border:1px solid var(--border-color);overflow:hidden}
    .admin-header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:2rem;text-align:center;color:#fff}
    .admin-header .shield{width:56px;height:56px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
    .admin-header h1{font-size:1.4rem;font-weight:700;margin-bottom:.25rem}
    .admin-header p{font-size:.82rem;opacity:.75}
    .admin-body{padding:2rem}
    .error-msg{font-size:.82rem;color:#ef4444;background:#fef2f2;padding:.65rem .9rem;border-radius:var(--radius-md);margin-bottom:1rem;display:none}
    #toast{position:fixed;top:1.5rem;right:1.5rem;z-index:9999;background:#1e1b4b;color:#fff;padding:.75rem 1.25rem;border-radius:var(--radius-md);font-size:.85rem;font-weight:500;transform:translateX(120%);transition:transform .3s ease;box-shadow:var(--shadow-lg)}
    #toast.show{transform:translateX(0)}
  </style>
</head>
<body>
<div id="toast"></div>
<div class="admin-box">
  <div class="admin-header">
    <div class="shield"><i data-feather="shield" style="width:28px;height:28px"></i></div>
    <h1>Admin Portal</h1>
    <p>Service Sphere Control Panel</p>
  </div>
  <div class="admin-body">
    <div class="error-msg" id="errorMsg"></div>
    <form id="adminForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label">Admin Username</label>
        <input type="text" class="form-input" id="username" placeholder="admin" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="submitBtn">
        Sign In to Admin Panel
      </button>
    </form>
    <p style="text-align:center;font-size:.78rem;color:var(--text-muted);margin-top:1.25rem">
      Demo credentials: <strong>admin</strong> / <strong>admin123</strong>
    </p>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
  feather.replace();

  // If already logged in as admin, skip to dashboard
  const existing = SS.getUser();
  if (existing && existing.role === 'admin') {
    window.location.href = 'verify-providers.html';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const errEl = document.getElementById('errorMsg');

    if (u === 'admin' && p === 'admin123') {
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      SS.setUser({
        id: 'admin001',
        name: 'Admin',
        lastname: '',
        email: 'admin@servicesphere.com',
        phone: '0000000000',
        role: 'admin'
      });
      localStorage.setItem('role', 'admin');
      showToast('Welcome back, Admin!');
      setTimeout(() => { window.location.href = 'verify-providers.html'; }, 900);
    } else {
      errEl.textContent = 'Invalid credentials. Use admin / admin123.';
      errEl.style.display = 'block';
      setTimeout(() => errEl.style.display = 'none', 3000);
    }
  }
</script>
</body>
</html>
