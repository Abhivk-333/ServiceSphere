<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .earn-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:2.5rem}
    .earn-stat{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.75rem}
    .earn-stat .label{font-size:.82rem;color:var(--text-muted);display:flex;align-items:center;gap:.4rem}
    .earn-stat .val{font-size:2rem;font-weight:800;margin-top:.5rem}
    .earn-stat .change{font-size:.78rem;font-weight:600;margin-top:.25rem}
    .chart-placeholder{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:2rem;margin-bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .bars{display:flex;align-items:flex-end;gap:8px;height:160px;padding:1rem 0}
    .bar{width:28px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--primary),var(--secondary));transition:.3s;position:relative}
    .bar:hover{opacity:.8}
    .bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--text-muted);white-space:nowrap}
    .txn-table{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden}
    @media(max-width:768px){.earn-stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Provider</p>
    <nav class="sidebar-menu">
      <a href="dashboard-provider.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="manage-services.html" class="sidebar-item"><i data-feather="briefcase" style="width:18px"></i> My Services</a>
      <a href="active-job.html" class="sidebar-item"><i data-feather="zap" style="width:18px"></i> Active Jobs</a>
      <a href="chat-provider.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
      <a href="earnings.html" class="sidebar-item active"><i data-feather="dollar-sign" style="width:18px"></i> Earnings</a>
      <a href="profile-provider.html" class="sidebar-item"><i data-feather="user" style="width:18px"></i> My Profile</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.3rem">Earnings</h1>
    <p class="text-muted" style="font-size:.85rem;margin-bottom:2rem">Track your income and completed jobs</p>

    <div class="earn-stats" id="earnStats"></div>

    <div class="chart-placeholder">
      <h3 style="font-size:1rem;font-weight:700;align-self:flex-start">Monthly Overview</h3>
      <div class="bars" id="chartBars"></div>
    </div>

    <h3 style="font-size:1.05rem;font-weight:700;margin-bottom:1rem">Recent Transactions</h3>
    <div class="txn-table">
      <table class="data-table" id="txnTable"></table>
    </div>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>AuthGuard.require('provider');</script>
<script>
  const prov=SS.getProvider('p1')||SS.getProviders()[0];
  const completed=SS.getBookings().filter(b=>b.providerId===prov.id&&b.status==='completed');
  const total=completed.reduce((s,b)=>s+b.amount,0);
  const thisMonth=completed.length; // simplified

  document.getElementById('earnStats').innerHTML=`
    <div class="earn-stat"><div class="label"><i data-feather="dollar-sign" style="width:16px"></i> Total Earnings</div><div class="val">₹${total.toLocaleString()}</div><div class="change" style="color:#16a34a">↑ +12% from last month</div></div>
    <div class="earn-stat"><div class="label"><i data-feather="check-circle" style="width:16px"></i> Jobs Completed</div><div class="val">${completed.length}</div><div class="change" style="color:#16a34a">↑ ${completed.length} this month</div></div>
    <div class="earn-stat"><div class="label"><i data-feather="star" style="width:16px"></i> Rating</div><div class="val">${prov.rating}</div><div class="change" style="color:var(--text-muted)">${prov.reviewCount} reviews</div></div>`;

  // Simple bar chart
  const months=['Jan','Feb','Mar','Apr','May','Jun'];
  const vals=[1200,1800,900,total||2400,0,0];
  const max=Math.max(...vals,1);
  document.getElementById('chartBars').innerHTML=months.map((m,i)=>`<div class="bar" style="height:${Math.max((vals[i]/max)*140,4)}px"><span class="bar-label">${m}</span></div>`).join('');

  // Transactions table
  document.getElementById('txnTable').innerHTML=`
    <thead><tr><th>Service</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody>${completed.map(b=>{
      const svc=(prov.services||[]).find(s=>s.id===b.serviceId);
      return `<tr><td>${svc?.name||'Service'}</td><td>${b.date}</td><td style="font-weight:700;color:var(--primary)">₹${b.amount}</td><td><span class="badge badge-green">Paid</span></td></tr>`;
    }).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem">No transactions yet</td></tr>'}</tbody>`;
  feather.replace();
</script>
</body>
</html>
