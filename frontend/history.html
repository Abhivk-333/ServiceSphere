<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .tabs{display:flex;gap:0;border-bottom:2px solid var(--border-color);margin-bottom:2rem}
    .tab{padding:.75rem 1.5rem;font-size:.88rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition)}
    .tab:hover{color:var(--primary)}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .bk-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.25rem;transition:var(--transition)}
    .bk-card:hover{box-shadow:var(--shadow-md)}
    .bk-card img{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .bk-card .info{flex:1}
    .bk-card .bk-title{font-weight:700;font-size:.9rem}
    .bk-card .bk-meta{font-size:.78rem;color:var(--text-muted);margin-top:.2rem}
    .bk-card .bk-amount{font-weight:700;color:var(--primary);font-size:.9rem}
    .bk-actions{display:flex;gap:.5rem}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted)}
    .empty-state i{opacity:.3;margin-bottom:1rem}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Customer</p>
    <nav class="sidebar-menu">
      <a href="dashboard-customer.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="services.html" class="sidebar-item"><i data-feather="search" style="width:18px"></i> Find Services</a>
      <a href="history.html" class="sidebar-item active"><i data-feather="clock" style="width:18px"></i> My Bookings</a>
      <a href="chat-customer.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444" onclick="SS.logout()"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.3rem">My Bookings</h1>
    <p class="text-muted" style="font-size:.85rem;margin-bottom:1.5rem">Manage and track all your service bookings</p>
    <div class="tabs">
      <div class="tab active" onclick="showTab('all',this)">All</div>
      <div class="tab" onclick="showTab('active',this)">Active</div>
      <div class="tab" onclick="showTab('pending',this)">Pending</div>
      <div class="tab" onclick="showTab('completed',this)">Completed</div>
    </div>
    <div id="bookingsList"></div>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>
  AuthGuard.require('customer');
  let activeTab='all';
  let allBookings = [];

  function showTab(tab,el){
    activeTab=tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  async function loadBookings() {
    try {
      allBookings = await SS.getBookings();
      render();
    } catch (err) {
      console.error(err);
      document.getElementById('bookingsList').innerHTML = `<p style="padding:2rem">${err.message}</p>`;
    }
  }

  function render(){
    let bks = allBookings;
    
    // active, pending, completed tabs mapping to DB statuses
    if(activeTab === 'active') {
      bks = bks.filter(b => ['accepted', 'started_travel', 'arrived', 'active'].includes(b.status));
    } else if (activeTab === 'pending') {
      bks = bks.filter(b => b.status === 'pending');
    } else if (activeTab === 'completed') {
      bks = bks.filter(b => b.status === 'completed' || b.status === 'cancelled');
    }
    
    const el=document.getElementById('bookingsList');
    if(!bks.length){el.innerHTML='<div class="empty-state"><i data-feather="inbox" style="width:48px;height:48px"></i><p>No bookings found</p></div>';feather.replace();return;}
    
    el.innerHTML=bks.map(b=>{
      const p = b.providerId;
      const svc = b.serviceId;
      const statusBadge = ['accepted', 'started_travel', 'arrived', 'active'].includes(b.status) ? 'badge-green' : b.status === 'pending' ? 'badge-yellow' : 'badge-blue';
      
      let actions = '';
      if (['accepted', 'started_travel', 'arrived', 'active'].includes(b.status)) {
        actions = `<a href="tracking.html?id=${b._id}" class="btn btn-primary" style="padding:.4rem .85rem;font-size:.78rem">Track</a><a href="chat-customer.html?bid=${b._id}" class="btn btn-outline" style="padding:.4rem .85rem;font-size:.78rem">Chat</a>`;
      } else if (b.status === 'completed') {
        actions = `<a href="feedback.html?bid=${b._id}" class="btn btn-outline" style="padding:.4rem .85rem;font-size:.78rem">Review</a>`;
      } else if (b.status === 'pending') {
        actions = `<button class="btn btn-outline" style="padding:.4rem .85rem;font-size:.78rem;color:#ef4444;border-color:#fca5a5" onclick="cancelBooking('${b._id}')">Cancel</button>`;
      }

      return `<div class="bk-card">
        <img src="${p?.profilePic || 'https://via.placeholder.com/48'}" alt="">
        <div class="info"><div class="bk-title">${svc?.title||'Service'} — ${p?.firstName||'Provider'} ${p?.lastName||''}</div><div class="bk-meta">${new Date(b.date).toLocaleDateString()} · ${b.timeSlot} · <span class="badge ${statusBadge}" style="font-size:.68rem">${b.status}</span></div></div>
        <div class="bk-amount">₹${b.amount}</div>
        <div class="bk-actions">${actions}</div>
      </div>`;
    }).join('');
    feather.replace();
  }

  async function cancelBooking(id) {
    if(confirm('Cancel this booking?')) {
      try {
        await SS.updateBookingStatus(id, 'cancelled');
        loadBookings();
      } catch (err) {
        console.error(err);
        alert('Failed to cancel booking');
      }
    }
  }

  loadBookings();
</script>
</body>
</html>
