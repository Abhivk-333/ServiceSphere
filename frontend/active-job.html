<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Jobs — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .job-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem}
    .job-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
    .job-top img{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .job-top .name{font-weight:700;font-size:.9rem}
    .job-top .meta{font-size:.78rem;color:var(--text-muted)}
    .job-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.25rem}
    .job-stat{text-align:center;padding:1rem;background:#f8fafc;border-radius:var(--radius-md)}
    .job-stat .val{font-size:1.3rem;font-weight:800}
    .job-stat .lbl{font-size:.72rem;color:var(--text-muted);margin-top:.2rem}
    .timer-inline{font-variant-numeric:tabular-nums;color:var(--primary)}
    .job-actions{display:flex;gap:.75rem;flex-wrap:wrap}
    /* Milestone mini-steps */
    .m-steps{display:flex;align-items:center;gap:0;margin:.85rem 0;flex-wrap:wrap}
    .m-step{display:flex;align-items:center;gap:.3rem;font-size:.73rem;font-weight:600;padding:.3rem .6rem;border-radius:999px;background:#f1f5f9;color:var(--text-muted)}
    .m-step.done{background:#dcfce7;color:#166534}
    .m-step.active{background:#dbeafe;color:#1e40af;animation:glowPulse 1.4s infinite}
    .m-arrow{width:16px;height:1px;background:var(--border-color);flex-shrink:0}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.15)}50%{box-shadow:0 0 0 4px rgba(79,70,229,.1)}}
    /* Dynamic action button */
    .action-btn{border:none;border-radius:var(--radius-md);padding:.65rem 1.25rem;color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:.4rem}
    .action-btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
    .action-btn.accepted    {background:linear-gradient(135deg,#4f46e5,#7c3aed)}
    .action-btn.started_travel{background:linear-gradient(135deg,#f97316,#ea580c)}
    .action-btn.arrived     {background:linear-gradient(135deg,#0ea5e9,#0284c7)}
    .action-btn.started_work{background:linear-gradient(135deg,#10b981,#059669)}
    /* Safety status bar */
    .safety-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem .85rem;border-radius:var(--radius-md);font-size:.8rem;font-weight:600;margin-bottom:1rem}
    .safety-bar.safe{background:#dcfce7;color:#166534}
    .safety-bar.alert{background:#fef2f2;color:#991b1b}
    /* Audit note */
    .audit-note{background:#fef9c3;border:1px solid #fde68a;border-radius:var(--radius-md);padding:.65rem .9rem;font-size:.8rem;color:#92400e;margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
    /* SOS button */
    .sos-btn{background:#ef4444;color:#fff;border:none;border-radius:var(--radius-md);padding:.6rem 1rem;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:var(--transition)}
    .sos-btn:hover{background:#dc2626;transform:scale(1.03)}
    .sos-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
    .sos-modal.show{display:flex}
    .sos-box{background:#fff;border-radius:var(--radius-xl);padding:2.5rem;text-align:center;max-width:380px;border:3px solid #ef4444}
    @media(max-width:768px){.job-grid{grid-template-columns:1fr 1fr}.m-steps{gap:.25rem}}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Provider</p>
    <nav class="sidebar-menu">
      <a href="dashboard-provider.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="manage-services.html" class="sidebar-item"><i data-feather="briefcase" style="width:18px"></i> My Services</a>
      <a href="active-job.html" class="sidebar-item active"><i data-feather="zap" style="width:18px"></i> Active Jobs</a>
      <a href="chat-provider.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
      <a href="earnings.html" class="sidebar-item"><i data-feather="dollar-sign" style="width:18px"></i> Earnings</a>
      <a href="profile-provider.html" class="sidebar-item"><i data-feather="user" style="width:18px"></i> My Profile</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444" onclick="SS.logout()"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:.3rem">Active Jobs</h1>
    <p class="text-muted" style="font-size:.85rem;margin-bottom:2rem">Milestone-based job progress management</p>
    <div id="jobsList"></div>
  </main>
</div>

<!-- Provider SOS Modal -->
<div class="sos-modal" id="provSOSModal">
  <div class="sos-box">
    <div style="width:64px;height:64px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
      <i data-feather="alert-octagon" style="width:32px;height:32px;color:#ef4444"></i>
    </div>
    <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:.5rem">Send SOS Alert?</h2>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:1.5rem">This will notify the Service Sphere admin team immediately. Use only in emergencies.</p>
    <textarea id="provSOSMsg" style="width:100%;padding:.75rem;border:1px solid var(--border-color);border-radius:var(--radius-md);font-family:inherit;font-size:.85rem;margin-bottom:1rem;resize:none;height:80px" placeholder="Describe the situation…"></textarea>
    <div style="display:flex;gap:.75rem">
      <button class="btn btn-outline" style="flex:1" onclick="closeProvSOS()">Cancel</button>
      <button class="btn" style="flex:1;background:#ef4444;color:#fff;font-weight:700" onclick="confirmProvSOS()">&#x1F6A8; Send SOS</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  AuthGuard.require('provider');
  const user = SS.getUser();

  const ML_META = {
    accepted:      { emoji:'✅', short:'Accepted'   },
    started_travel:{ emoji:'🛵', short:'Travelling' },
    arrived:       { emoji:'📍', short:'Arrived'    },
    active:        { emoji:'🛠️', short:'Working'   },
    completed:     { emoji:'🎉', short:'Done'       }
  };

  const ACTION_CFG = {
    accepted:      { label:'🛵 Start Travelling',   cls:'accepted',       next:'started_travel' },
    started_travel:{ label:'📍 Mark Arrived',       cls:'started_travel', next:'arrived' },
    arrived:       { label:'🛠️ Start Work',         cls:'arrived',        next:'active' },
    active:        { label:'✅ Complete Job',        cls:'started_work',   next:'completed' }
  };
  const MILESTONES = ['accepted', 'started_travel', 'arrived', 'active', 'completed'];

  async function render() {
    try {
      const allBookings = await SS.getBookings();
      
      // All bookings that are in progress (accepted but not completed/cancelled)
      const activeJobs = allBookings.filter(b =>
        ['accepted', 'started_travel', 'arrived', 'active'].includes(b.status)
      );

      const el = document.getElementById('jobsList');
      if (!activeJobs.length) {
        el.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--text-muted)"><i data-feather="coffee" style="width:48px;height:48px;opacity:.3"></i><p style="margin-top:1rem">No active jobs. Take a break! ☕</p></div>';
        feather.replace();
        return;
      }

      el.innerHTML = activeJobs.map(b => {
        const tracking = b.tracking || [];
        const m = {};
        tracking.forEach(t => { m[t.status] = t.timestamp; });

        const svc = b.serviceId || { title:'Service', duration:60 };
        const cur = b.status;
        const cfg = ACTION_CFG[cur] || null;

        // Safety bar
        const safeClass = b.safetyStatus === 'reported' ? 'alert' : 'safe';
        const safeText  = b.safetyStatus === 'reported' ? '⚠ Safety Issue Reported' : '● All Clear';

        // Milestone pill steps
        let nextMilestone = null;
        if (cfg) nextMilestone = cfg.next;
        
        const pills = MILESTONES.map((k, i) => {
          const done = !!m[k];
          const isActive = k === nextMilestone && !done;
          const meta = ML_META[k];
          const arrow = i < MILESTONES.length - 1 ? '<div class="m-arrow"></div>' : '';
          return `<div class="m-step ${done ? 'done' : isActive ? 'active' : ''}">${meta.emoji} ${meta.short}</div>${arrow}`;
        }).join('');

        // Work timer
        const workTimer = m.active && !m.completed
          ? `<div id="timer-${b._id}" style="font-size:1.3rem;font-weight:800;font-variant-numeric:tabular-nums;color:#10b981">00:00</div>`
          : m.completed ? '<div style="color:#10b981;font-weight:700">Done</div>' : '<div style="color:var(--text-muted)">—</div>';

        // ETA select row when next milestone is started_travel
        const etaRow = nextMilestone === 'started_travel'
          ? `<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.85rem">
              <label style="font-size:.82rem;font-weight:600">ETA:</label>
              <select id="eta-${b._id}" style="padding:.35rem .6rem;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:.82rem">
                <option value="15">15 min</option><option value="30">30 min</option><option value="45">45 min</option>
              </select>
            </div>` : '';

        // Audit note — arrived but customer hasn't confirmed
        const auditNote = m.arrived && !m.active && !b.customerConfirmedArrival
          ? `<div class="audit-note"><i data-feather="clock" style="width:14px;flex-shrink:0"></i> Waiting for customer to confirm arrival before starting work.</div>` : '';

        return `<div class="job-card">
          <div class="safety-bar ${safeClass}">${safeText}</div>
          <div class="job-top">
            <img src="${b.customerId?.profilePic || 'https://via.placeholder.com/48'}" alt="">
            <div><div class="name">${b.customerId?.firstName} ${b.customerId?.lastName}</div><div class="meta">Booking #${b._id} · ${b.address || 'Address pending'}</div></div>
            <span class="badge badge-blue" style="margin-left:auto">${(cur || 'accepted').replace('_',' ').toUpperCase()}</span>
          </div>
          <div class="m-steps">${pills}</div>
          <div class="job-grid">
            <div class="job-stat"><div class="val">${svc.title}</div><div class="lbl">Service</div></div>
            <div class="job-stat"><div class="val">${workTimer}</div><div class="lbl">Work Timer</div></div>
            <div class="job-stat"><div class="val">₹${b.amount}</div><div class="lbl">Amount</div></div>
          </div>
          ${auditNote}
          ${etaRow}
          <div class="job-actions">
            ${cfg
              ? `<button class="action-btn ${cfg.cls}" style="flex:1" onclick="advance('${b._id}', '${cfg.next}')">${cfg.label}</button>`
              : `<span class="badge badge-green" style="flex:1;text-align:center;padding:.65rem">✅ Job Completed</span>`}
            <a href="chat-provider.html?bid=${b._id}" class="btn btn-outline" style="flex:1;text-align:center">Message Customer</a>
            <button class="sos-btn" onclick="openProvSOS('${b._id}')"><i data-feather="alert-octagon" style="width:15px;height:15px"></i> SOS</button>
          </div>
        </div>`;
      }).join('');

      feather.replace();

      // Start work timers for each active booking
      activeJobs.forEach(b => {
        const tracking = b.tracking || [];
        const m = {};
        tracking.forEach(t => { m[t.status] = t.timestamp; });
        if (m.active && !m.completed) {
          tickWork(b._id, m.active);
        }
      });
    } catch (err) {
      console.error(err);
      document.getElementById('jobsList').innerHTML = `<p style="color:#ef4444">${err.message}</p>`;
    }
  }

  function fmtMs(ms, up) {
    const totSec = Math.floor(ms / 1000);
    const m = Math.floor(totSec / 60);
    const s = totSec % 60;
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  }

  // Live work timer ticking
  function tickWork(bid, startTime) {
    const interval = setInterval(() => {
      const el = document.getElementById('timer-' + bid);
      if (!el) { clearInterval(interval); return; }
      const elapsed = Date.now() - new Date(startTime).getTime();
      el.textContent = fmtMs(elapsed, false);
    }, 1000);
  }

  async function advance(id, nextStatus) {
    try {
      await SS.updateBookingStatus(id, nextStatus);
      render();
    } catch (err) {
      console.error(err);
      alert('Failed to update status');
    }
  }

  // Poll for updates
  setInterval(render, 5000);
  render();

  // ── Provider SOS ────────────────────────────────────────
  let _sosBid = null;
  function openProvSOS(bid) {
    _sosBid = bid;
    document.getElementById('provSOSMsg').value = '';
    document.getElementById('provSOSModal').classList.add('show');
    feather.replace();
  }
  function closeProvSOS() {
    document.getElementById('provSOSModal').classList.remove('show');
    _sosBid = null;
  }
  function confirmProvSOS() {
    if (!_sosBid) return;
    closeProvSOS();
    alert('🚨 SOS alert sent to admin. Help is on the way.');
  }
</script>
</body>
</html>
