<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Services — Service Sphere</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .svc-table-card{background:var(--surface-color);border:1px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden}
    .svc-row{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid #f1f5f9;transition:var(--transition)}
    .svc-row:last-child{border-bottom:none}
    .svc-row:hover{background:rgba(79,70,229,.02)}
    .svc-row .name{font-weight:600;font-size:.9rem;flex:1}
    .svc-row .price{font-weight:700;color:var(--primary);min-width:80px;text-align:right}
    .svc-row .dur{font-size:.82rem;color:var(--text-muted);min-width:80px;text-align:right}
    .header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <a href="index.html" class="navbar-brand text-gradient" style="font-size:1.25rem">Service Sphere</a>
    <p style="font-size:.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-top:.15rem">Provider</p>
    <nav class="sidebar-menu">
      <a href="dashboard-provider.html" class="sidebar-item"><i data-feather="home" style="width:18px"></i> Overview</a>
      <a href="manage-services.html" class="sidebar-item active"><i data-feather="briefcase" style="width:18px"></i> My Services</a>
      <a href="active-job.html" class="sidebar-item"><i data-feather="zap" style="width:18px"></i> Active Jobs</a>
      <a href="chat-provider.html" class="sidebar-item"><i data-feather="message-circle" style="width:18px"></i> Messages</a>
      <a href="earnings.html" class="sidebar-item"><i data-feather="dollar-sign" style="width:18px"></i> Earnings</a>
      <a href="profile-provider.html" class="sidebar-item"><i data-feather="user" style="width:18px"></i> My Profile</a>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-color)">
      <a href="index.html" class="sidebar-item" style="color:#ef4444"><i data-feather="log-out" style="width:18px"></i> Logout</a>
    </div>
  </aside>
  <main class="main-content">
    <div class="header-bar">
      <div><h1 style="font-size:1.5rem;font-weight:700">My Services</h1><p class="text-muted" style="font-size:.85rem">Manage your service listings</p></div>
      <a href="add-service.html" class="btn btn-primary" style="display:inline-flex;align-items:center;gap:.4rem"><i data-feather="plus" style="width:16px"></i> Add Service</a>
    </div>
    <div class="svc-table-card" id="svcList"></div>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script>AuthGuard.require('provider');</script>
<script>
  AuthGuard.require('provider');
  const user = SS.getUser();

  async function loadServices() {
    try {
      const allServices = await SS.getAllServices();
      const myServices = allServices.filter(s => s.providerId?._id === user.id || s.providerId === user.id);
      
      const el = document.getElementById('svcList');
      if(!myServices.length) {
        el.innerHTML='<div style="padding:3rem;text-align:center;color:var(--text-muted)">No services yet. <a href="add-service.html" style="color:var(--primary);font-weight:600">Add your first service</a></div>';
        return;
      }
      
      el.innerHTML = myServices.map(s => `
        <div class="svc-row">
          ${s.image ? `<img src="http://localhost:5000${s.image}" style="width:50px;height:50px;border-radius:var(--radius-sm);object-fit:cover;margin-right:1rem">` : ''}
          <div class="name">${s.title}<div style="font-size:.75rem;color:var(--text-muted);margin-top:.15rem">${s.description}</div></div>
          <div class="dur">${s.category}</div>
          <div class="price">₹${s.price}</div>
          <button class="btn btn-outline" style="padding:.35rem .75rem;font-size:.75rem;color:#ef4444;border-color:#fca5a5" onclick="deleteSvc('${s._id}')">Remove</button>
        </div>`).join('');
    } catch (err) {
      console.error(err);
      document.getElementById('svcList').innerHTML = `<p style="padding:2rem;text-align:center;color:#ef4444">${err.message}</p>`;
    }
  }

  async function deleteSvc(id){
    if(!confirm('Remove this service?')) return;
    try {
      await SS.deleteService(id);
      loadServices();
    } catch (err) {
      console.error(err);
      alert('Failed to delete service');
    }
  }
  
  loadServices();
</script>
</body>
</html>
